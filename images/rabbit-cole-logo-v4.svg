<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- Clean white background -->
  <rect width="600" height="600" fill="#ffffff"/>

  <!-- LEFT MICROPHONE EAR -->
  <rect x="259" y="210" width="14" height="52" rx="2" fill="#111111"/>
  <rect x="252" y="155" width="28" height="62" rx="14" fill="#111111"/>
  <line x1="252" y1="175" x2="280" y2="175" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="252" y1="185" x2="280" y2="185" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="252" y1="195" x2="280" y2="195" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="252" y1="205" x2="280" y2="205" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- RIGHT MICROPHONE EAR -->
  <rect x="327" y="210" width="14" height="52" rx="2" fill="#111111"/>
  <rect x="320" y="155" width="28" height="62" rx="14" fill="#111111"/>
  <line x1="320" y1="175" x2="348" y2="175" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="185" x2="348" y2="185" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="195" x2="348" y2="195" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="205" x2="348" y2="205" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- The hole — bold black ellipse -->
  <ellipse cx="300" cy="330" rx="165" ry="75" fill="#111111"/>

  <!-- Head -->
  <circle cx="300" cy="265" r="42" fill="#111111"/>
  <!-- Body -->
  <ellipse cx="300" cy="312" rx="50" ry="32" fill="#111111"/>

  <!-- White eyes -->
  <circle cx="285" cy="260" r="6" fill="#ffffff"/>
  <circle cx="315" cy="260" r="6" fill="#ffffff"/>
  <!-- Pupils -->
  <circle cx="287" cy="261" r="3" fill="#111111"/>
  <circle cx="317" cy="261" r="3" fill="#111111"/>

  <!-- Hole rim -->
  <ellipse cx="300" cy="330" rx="165" ry="75" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- Text inside the hole -->
  <text
    x="300" y="318"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="7"
    fill="#ffffff"
    text-anchor="middle"
    opacity="0.75"
  >DOWN THE</text>

  <text
    x="300" y="352"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="2"
    fill="#ffffff"
    text-anchor="middle"
  >RABBIT COLE</text>

</svg>
